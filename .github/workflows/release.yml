name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/bundle-app.sh

      - name: Create zip
        run: cd dist && zip -r "My.Claw.zip" "My Claw.app"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/My.Claw.zip --clobber
